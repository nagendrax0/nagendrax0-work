<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Work — Nagendra Shekhawat</title>
  <meta name="description" content="Selected work by Nagendra Shekhawat — B2B SaaS Designer & Developer.">
  <meta name="author" content="Nagendra Shekhawat">

  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://work.nagendrax0.com/">
  <meta property="og:title" content="Work — Nagendra Shekhawat">
  <meta property="og:description" content="Selected work by Nagendra Shekhawat — B2B SaaS Designer & Developer.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Work — Nagendra Shekhawat">
  <meta name="twitter:description" content="Selected work by Nagendra Shekhawat.">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #e8e8e8;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 24px;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 0 120px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .logo {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo span { color: var(--muted); }

    nav a {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    /* Intro */
    .intro {
      margin-bottom: 64px;
    }

    .intro h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .intro p {
      font-size: 15px;
      color: var(--muted);
      max-width: 480px;
    }

    /* Work list */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .work-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 64px;
    }

    .work-item a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      transition: opacity 0.15s;
      gap: 16px;
    }

    .work-item a:hover { opacity: 0.7; }

    .work-item a:hover .arrow { transform: translate(3px, -3px); }

    .work-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .work-name {
      font-size: 15px;
      font-weight: 450;
      letter-spacing: -0.01em;
    }

    .work-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .work-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .work-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .arrow {
      font-size: 14px;
      color: var(--muted);
      transition: transform 0.15s;
    }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 13px;
      color: var(--muted);
    }

    .social-links {
      display: flex;
      gap: 20px;
    }

    .social-links a {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s;
    }

    .social-links a:hover { color: var(--text); }

    @media (max-width: 480px) {
      .container { padding: 48px 0 80px; }
      header { margin-bottom: 48px; }
      .work-tag { display: none; }
      footer { flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">nagendrax0 <span>/ work</span></div>
      <nav>
        <a href="https://nagendrax0.com" target="_blank">main site ↗</a>
      </nav>
    </header>

    <section class="intro">
      <h1>Directory</h1>
      <p>Things I'm building or working on — for fun, for clients, or just because. Links to everything.</p>
    </section>

    <div class="section-label">Everything</div>
    <ul class="work-list">
      <!-- Add your work items here -->
      <li class="work-item">
        <a href="#" target="_blank">
          <div class="work-meta">
            <span class="work-name">Project Name</span>
            <span class="work-desc">Brief description of the work</span>
          </div>
          <div class="work-right">
            <span class="work-tag">Design</span>
            <span class="arrow">↗</span>
          </div>
        </a>
      </li>
    </ul>

    <footer>
      <p>Nagendra Shekhawat — Bangalore</p>
      <div class="social-links">
        <a href="https://x.com/nagendrax0" target="_blank">X</a>
        <a href="https://nagendrax0.com" target="_blank">Website</a>
      </div>
    </footer>

  </div>
</body>
</html>
