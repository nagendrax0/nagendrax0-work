<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Work — Nagendra Shekhawat</title>
  <meta name="description" content="Things Nagendra Shekhawat is building or working on.">
  <meta name="author" content="Nagendra Shekhawat">

  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://work.nagendrax0.com/">
  <meta property="og:title" content="Work — Nagendra Shekhawat">
  <meta property="og:description" content="Things Nagendra Shekhawat is building or working on.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Work — Nagendra Shekhawat">
  <meta name="twitter:description" content="Things Nagendra Shekhawat is building or working on.">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #666;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 24px;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 0 120px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .logo {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .logo span { color: var(--muted); }

    nav a {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    /* Intro */
    .intro { margin-bottom: 64px; }

    .intro h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .intro p {
      font-size: 15px;
      color: var(--muted);
      max-width: 480px;
    }

    /* Work list */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .work-list {
      list-style: none;
      margin-bottom: 64px;
    }

    .work-item a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      transition: opacity 0.15s;
    }

    .work-item a:hover { opacity: 0.6; }
    .work-item a:hover .arrow { transform: translate(3px, -3px); }

    .work-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .work-name {
      font-size: 15px;
      font-weight: 450;
      letter-spacing: -0.01em;
    }

    .work-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .work-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .work-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .arrow {
      font-size: 14px;
      color: var(--muted);
      transition: transform 0.15s;
    }

    /* Hover preview */
    .preview {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transform: scale(0.94) translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      width: 260px;
    }

    .preview.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .preview-inner {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* Tiny browser chrome */
    .preview-chrome {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 10px;
      border-bottom: 1px solid #222;
      background: #111;
    }

    .preview-chrome span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #333;
    }

    .preview-chrome span:nth-child(1) { background: #ff5f57; }
    .preview-chrome span:nth-child(2) { background: #febc2e; }
    .preview-chrome span:nth-child(3) { background: #28c840; }

    .preview-img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      object-position: top;
    }

    .preview-img-placeholder {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #444;
    }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 13px;
      color: var(--muted);
    }

    .social-links {
      display: flex;
      gap: 20px;
    }

    .social-links a {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s;
    }

    .social-links a:hover { color: var(--text); }

    @media (max-width: 480px) {
      .container { padding: 48px 0 80px; }
      header { margin-bottom: 48px; }
      .work-tag { display: none; }
      footer { flex-direction: column; gap: 16px; align-items: flex-start; }
      .preview { display: none; }
    }
  </style>
</head>
<body>

  <!-- Cursor preview -->
  <div class="preview" id="preview">
    <div class="preview-inner">
      <div class="preview-chrome">
        <span></span><span></span><span></span>
      </div>
      <img class="preview-img" id="preview-img" src="" alt="" />
    </div>
  </div>

  <div class="container">

    <header>
      <div class="logo">nagendrax0 <span>/ work</span></div>
      <nav>
        <a href="https://nagendrax0.com" target="_blank">main site ↗</a>
      </nav>
    </header>

    <section class="intro">
      <h1>Directory</h1>
      <p>Things I'm building or working on — for fun, for clients, or just because. Links to everything.</p>
    </section>

    <div class="section-label">Everything</div>
    <ul class="work-list">
      <!-- Each work-item: add data-preview="./images/project-name.png" to <li> for hover image -->
      <li class="work-item" data-preview="./images/nagendrax0.png">
        <a href="https://nagendrax0.com" target="_blank">
          <div class="work-meta">
            <span class="work-name">nagendrax0.com</span>
            <span class="work-desc">Portfolio — B2B SaaS design & development</span>
          </div>
          <div class="work-right">
            <span class="work-tag">Portfolio</span>
            <span class="arrow">↗</span>
          </div>
        </a>
      </li>
    </ul>

    <footer>
      <p>Nagendra Shekhawat — Bangalore</p>
      <div class="social-links">
        <a href="https://x.com/nagendrax0" target="_blank">X</a>
        <a href="https://nagendrax0.com" target="_blank">Website</a>
      </div>
    </footer>

  </div>

  <script>
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('preview-img');
    const offset = { x: 20, y: -20 };

    let mouseX = 0, mouseY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      const pw = preview.offsetWidth;
      const ph = preview.offsetHeight;
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let x = mouseX + offset.x;
      let y = mouseY + offset.y;

      if (x + pw > vw - 16) x = mouseX - pw - offset.x;
      if (y + ph > vh - 16) y = vh - ph - 16;
      if (y < 16) y = 16;

      preview.style.left = x + 'px';
      preview.style.top = y + 'px';
    });

    document.querySelectorAll('.work-item[data-preview]').forEach(item => {
      const src = item.dataset.preview;

      item.addEventListener('mouseenter', () => {
        if (src) {
          previewImg.src = src;
          previewImg.style.display = 'block';
        } else {
          previewImg.style.display = 'none';
        }
        preview.classList.add('visible');
      });

      item.addEventListener('mouseleave', () => {
        preview.classList.remove('visible');
      });
    });
  </script>
</body>
</html>
