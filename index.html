<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Work — Nagendra Shekhawat</title>
  <meta name="description" content="Things Nagendra Shekhawat is building or working on.">
  <meta name="author" content="Nagendra Shekhawat">

  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://work.nagendrax0.com/">
  <meta property="og:title" content="Work — Nagendra Shekhawat">
  <meta property="og:description" content="Things Nagendra Shekhawat is building or working on.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Work — Nagendra Shekhawat">
  <meta name="twitter:description" content="Things Nagendra Shekhawat is building or working on.">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #555;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 24px;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 0 120px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .logo { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
    .logo span { color: var(--muted); }

    nav a {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }

    /* Intro */
    .intro { margin-bottom: 72px; }

    .intro h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .intro p {
      font-size: 15px;
      color: var(--muted);
    }

    /* Groups */
    .groups { display: flex; flex-direction: column; gap: 56px; }

    .group-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Work list */
    .work-list { list-style: none; }

    .work-item a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      transition: opacity 0.15s;
    }

    .work-item a:hover { opacity: 0.55; }
    .work-item a:hover .arrow { transform: translate(3px, -3px); }

    .work-meta { display: flex; flex-direction: column; gap: 3px; }

    .work-name {
      font-size: 15px;
      font-weight: 450;
      letter-spacing: -0.01em;
    }

    .work-desc { font-size: 13px; color: var(--muted); }

    .work-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.live {
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.2);
      background: rgba(74, 222, 128, 0.06);
    }

    .badge.wip {
      color: #fb923c;
      border-color: rgba(251, 146, 60, 0.2);
      background: rgba(251, 146, 60, 0.06);
    }

    .badge.archived {
      color: var(--muted);
    }

    .arrow {
      font-size: 14px;
      color: var(--muted);
      transition: transform 0.15s;
    }

    /* Cursor preview */
    .preview {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transform: scale(0.94) translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      width: 260px;
    }

    .preview.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .preview-inner {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .preview-chrome {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 10px;
      border-bottom: 1px solid #222;
      background: #111;
    }

    .preview-chrome span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .preview-chrome span:nth-child(1) { background: #ff5f57; }
    .preview-chrome span:nth-child(2) { background: #febc2e; }
    .preview-chrome span:nth-child(3) { background: #28c840; }

    .preview-img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      object-position: top;
    }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 80px;
    }

    footer p { font-size: 13px; color: var(--muted); }

    .social-links { display: flex; gap: 20px; }

    .social-links a {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s;
    }

    .social-links a:hover { color: var(--text); }

    @media (max-width: 480px) {
      .container { padding: 48px 0 80px; }
      header { margin-bottom: 48px; }
      .badge:not(.live):not(.wip) { display: none; }
      footer { flex-direction: column; gap: 16px; align-items: flex-start; }
      .preview { display: none; }
    }
  </style>
</head>
<body>

  <div class="preview" id="preview">
    <div class="preview-inner">
      <div class="preview-chrome">
        <span></span><span></span><span></span>
      </div>
      <img class="preview-img" id="preview-img" src="" alt="" />
    </div>
  </div>

  <div class="container">
    <header>
      <div class="logo">nagendrax0 <span>/ work</span></div>
      <nav><a href="https://nagendrax0.com" target="_blank">main site ↗</a></nav>
    </header>

    <section class="intro">
      <h1>Directory</h1>
      <p>Things I'm building or working on — for fun, for clients, or just because.</p>
    </section>

    <div class="groups" id="groups"></div>

    <footer>
      <p>Nagendra Shekhawat — Bangalore</p>
      <div class="social-links">
        <a href="https://x.com/nagendrax0" target="_blank">X</a>
        <a href="https://nagendrax0.com" target="_blank">Website</a>
      </div>
    </footer>
  </div>

  <script>
    const GROUP_ORDER = ['website', 'web-app', 'app', 'fun'];
    const GROUP_LABELS = {
      'website':  'Websites',
      'web-app':  'Web Apps',
      'app':      'Apps',
      'fun':      'Fun',
    };

    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('preview-img');

    document.addEventListener('mousemove', (e) => {
      const pw = preview.offsetWidth, ph = preview.offsetHeight;
      const vw = window.innerWidth, vh = window.innerHeight;
      let x = e.clientX + 20, y = e.clientY - 20;
      if (x + pw > vw - 16) x = e.clientX - pw - 20;
      if (y + ph > vh - 16) y = vh - ph - 16;
      if (y < 16) y = 16;
      preview.style.left = x + 'px';
      preview.style.top = y + 'px';
    });

    function showPreview(src) {
      if (!src) return;
      previewImg.src = src;
      preview.classList.add('visible');
    }

    function hidePreview() {
      preview.classList.remove('visible');
    }

    function statusLabel(status) {
      const map = { live: 'Live', wip: 'WIP', archived: 'Archived' };
      return map[status] || status;
    }

    function renderGroups(projects) {
      const grouped = {};
      for (const p of projects) {
        if (!grouped[p.type]) grouped[p.type] = [];
        grouped[p.type].push(p);
      }

      // Sort within each group by updatedAt descending
      for (const type in grouped) {
        grouped[type].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      }

      const container = document.getElementById('groups');

      for (const type of GROUP_ORDER) {
        if (!grouped[type]?.length) continue;

        const section = document.createElement('div');
        section.className = 'group';

        const label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = GROUP_LABELS[type] || type;
        section.appendChild(label);

        const ul = document.createElement('ul');
        ul.className = 'work-list';

        for (const p of grouped[type]) {
          const li = document.createElement('li');
          li.className = 'work-item';
          if (p.image) {
            li.addEventListener('mouseenter', () => showPreview(p.image));
            li.addEventListener('mouseleave', hidePreview);
          }

          li.innerHTML = `
            <a href="${p.url}" target="_blank" rel="noopener">
              <div class="work-meta">
                <span class="work-name">${p.name}</span>
                ${p.description ? `<span class="work-desc">${p.description}</span>` : ''}
              </div>
              <div class="work-right">
                ${p.version ? `<span class="badge">v${p.version}</span>` : ''}
                <span class="badge ${p.status}">${statusLabel(p.status)}</span>
                <span class="arrow">↗</span>
              </div>
            </a>`;

          ul.appendChild(li);
        }

        section.appendChild(ul);
        container.appendChild(section);
      }
    }

    fetch('./projects.json')
      .then(r => r.json())
      .then(renderGroups)
      .catch(() => {
        document.getElementById('groups').innerHTML =
          '<p style="color:#555;font-size:14px">No projects yet.</p>';
      });
  </script>
</body>
</html>
